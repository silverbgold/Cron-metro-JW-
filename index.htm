<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Cronômetro JW">
<title>Cronômetro JW</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;overflow:hidden;background:#0f0f0f;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;flex-direction:column}

#header{background:#1a1a1a;border-bottom:1px solid #2e2e2e;padding:max(env(safe-area-inset-top),12px) 16px 12px;flex-shrink:0}
#header h1{font-size:18px;font-weight:700;margin-bottom:10px}
#prog-select{width:100%;height:42px;padding:0 12px;font-size:15px;border:1px solid #3a3a3a;border-radius:10px;background:#242424;color:#f0f0f0;-webkit-appearance:none}

#summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 16px;flex-shrink:0}
.met{background:#1a1a1a;border-radius:10px;padding:10px 12px;border:1px solid #2e2e2e}
.met-lbl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.met-val{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums}
.met-val.sm{font-size:11px;font-weight:500;line-height:1.4;padding-top:2px}

#controls{display:flex;gap:8px;padding:0 16px 12px;flex-shrink:0}
.cbtn{height:48px;font-size:14px;font-weight:700;border-radius:10px;border:1px solid #3a3a3a;background:#242424;color:#f0f0f0;flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none}
.cbtn.red{background:#2d0e0e;color:#ef4444;border-color:#991b1b}
.cbtn:active{opacity:.5}

#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 16px max(env(safe-area-inset-bottom),24px)}
.sess{margin-bottom:20px}
.sess-lbl{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px}

.card{background:#1a1a1a;border-radius:14px;border:1px solid #2e2e2e;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px}
.card.run{border-color:#166534;background:#0d2b1a}
.card.over{border-color:#991b1b!important;background:#2d0e0e!important}
.card.song{opacity:.5}
.cinner{flex:1;min-width:0}
.cname{font-size:13px;font-weight:600;line-height:1.35;word-break:break-word}
.cmeta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.chora,.cdur{font-size:11px;color:#555}
.tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:999px}
.ts{background:#0d1f3c;color:#60a5fa;border:1px solid #1e40af}
.ty{background:#2d1f05;color:#fbbf24;border:1px solid #92400e}
.tb{background:#0d2b1a;color:#22c55e;border:1px solid #166534}
.tt{background:#242424;color:#555;border:1px dashed #3a3a3a}
.bwrap{height:3px;background:#3a3a3a;border-radius:2px;margin-top:7px}
.bfill{height:3px;border-radius:2px;background:#22c55e;transition:width .3s}
.bfill.over{background:#ef4444}

.ctimes{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;min-width:88px}
.ttotal{font-size:21px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.ttotal.red{color:#ef4444}
.tover{font-size:11px;font-weight:700;color:#ef4444;display:none}

.cact{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.abtn{width:46px;height:46px;border-radius:11px;border:1px solid #3a3a3a;background:#242424;display:flex;align-items:center;justify-content:center;font-size:17px;color:#a0a0a0;cursor:pointer;user-select:none;-webkit-user-select:none}
.abtn.go{background:#0d2b1a;border-color:#166534;color:#22c55e;font-size:22px}
.abtn:active{opacity:.4}

/* Modal CSV */
#csv-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;flex-direction:column;padding:20px 16px max(env(safe-area-inset-bottom),20px)}
#csv-modal.show{display:flex}
#csv-box{background:#1a1a1a;border-radius:14px;border:1px solid #3a3a3a;flex:1;display:flex;flex-direction:column;overflow:hidden;max-height:85vh}
#csv-header{padding:14px 16px;border-bottom:1px solid #2e2e2e;display:flex;align-items:center;gap:10px}
#csv-header span{font-size:15px;font-weight:700;flex:1}
#csv-close{width:32px;height:32px;background:#242424;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#a0a0a0;flex-shrink:0}
#csv-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#csv-table{width:100%;border-collapse:collapse;font-size:12px}
#csv-table th{background:#242424;color:#a0a0a0;padding:8px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0}
#csv-table td{padding:8px 10px;border-bottom:1px solid #2e2e2e;color:#f0f0f0;vertical-align:top}
#csv-table tr:last-child td{border-bottom:none}
#csv-table td.red{color:#ef4444;font-weight:600}
#csv-footer{padding:12px 16px;border-top:1px solid #2e2e2e}
#csv-note{font-size:12px;color:#555;text-align:center}

#dica{position:fixed;bottom:max(env(safe-area-inset-bottom),16px);left:16px;right:16px;background:#172554;border:1px solid #1e40af;border-radius:14px;padding:13px 15px;font-size:13px;color:#60a5fa;display:none;gap:10px;align-items:flex-start;z-index:999}
#dica b{display:block;font-size:14px;margin-bottom:3px;color:#93c5fd}
#dica-x{margin-left:auto;font-size:24px;line-height:1;cursor:pointer;color:#555;padding:0 2px;flex-shrink:0}
</style>
</head>
<body>

<div id="header">
  <h1>⏱ Cronômetro JW</h1>
  <select id="prog-select">
    <option value="sc">Assembleia — Com o Superintendente</option>
    <option value="rb">Assembleia — Com o Representante de Betel</option>
  </select>
</div>

<div id="summary">
  <div class="met"><div class="met-lbl">Tempo total</div><div class="met-val" id="v-total">0:00:00</div></div>
  <div class="met"><div class="met-lbl">Cronometradas</div><div class="met-val" id="v-count">0</div></div>
  <div class="met"><div class="met-lbl">Parte atual</div><div class="met-val sm" id="v-atual">—</div></div>
</div>

<div id="controls">
  <div class="cbtn red" id="btn-parar">■ Parar</div>
  <div class="cbtn" id="btn-zerar">↺ Zerar</div>
  <div class="cbtn" id="btn-csv">📋 Resumo</div>
</div>

<div id="scroll"><div id="sessions"></div></div>

<!-- Modal de resultados -->
<div id="csv-modal">
  <div id="csv-box">
    <div id="csv-header">
      <span>📋 Resumo dos tempos</span>
      <div id="csv-close">×</div>
    </div>
    <div id="csv-body">
      <table id="csv-table">
        <thead>
          <tr>
            <th>Parte</th>
            <th>Previsto</th>
            <th>Cronometrado</th>
            <th>Excesso</th>
          </tr>
        </thead>
        <tbody id="csv-tbody"></tbody>
      </table>
    </div>
    <div id="csv-footer">
      <div id="csv-note">Tire um print para salvar os resultados</div>
    </div>
  </div>
</div>

<div id="dica">
  <div><b>📲 Salvar na tela inicial</b>No Safari: toque em <strong>Compartilhar ⬆</strong> → <strong>Adicionar à Tela de Início</strong></div>
  <div id="dica-x">×</div>
</div>

<script>
function horaMin(h){var p=h.split(':');return parseInt(p[0])*60+parseInt(p[1])}
function calcDur(sessoes){
  var all=[];
  for(var i=0;i<sessoes.length;i++)for(var j=0;j<sessoes[i].partes.length;j++)all.push(sessoes[i].partes[j]);
  for(var i=0;i<all.length;i++){
    var a=all[i];if(a.dur!==undefined)continue;
    var nx=null;
    for(var j=i+1;j<all.length;j++){if(all[j].h){nx=horaMin(all[j].h);break}}
    var d=nx!==null?(nx-horaMin(a.h))*60000:null;
    a.dur=(d!==null&&d>0)?d:null;
  }
}

var PROGS={
  sc:{sessoes:[
    {r:"🧪 Faixa de Teste",partes:[{n:"Parte de teste (10 segundos)",h:"0:00",t:"tt",dur:10000}]},
    {r:"Sessão da Manhã",partes:[
      {n:"Música",h:"9:40",t:""},{n:"Cântico 85 e oração",h:"9:50",t:"ts"},
      {n:'"O Pai está procurando a esses"',h:"10:00",t:""},
      {n:"Série: Ao tentar entender as orientações de Jeová",h:"10:15",t:"ty"},
      {n:"Série: Ao lidar com o desânimo",h:"10:30",t:"ty"},
      {n:"Série: Ao se esforçar para fazer mais no serviço",h:"10:45",t:"ty"},
      {n:"Cântico 88 e anúncios",h:"11:05",t:"ts"},
      {n:"Como 'tornamos conhecida a verdade'?",h:"11:15",t:""},
      {n:"Batismo: O significado do seu batismo",h:"11:35",t:"tb"},
      {n:"Cântico 51",h:"12:05",t:"ts"}
    ]},
    {r:"Sessão da Tarde",partes:[
      {n:"Música",h:"13:20",t:""},{n:"Cântico 72 e oração",h:"13:30",t:"ts"},
      {n:"Discurso para o público: Como saber a diferença entre o certo e o errado?",h:"13:35",t:""},
      {n:"Resumo de A Sentinela",h:"14:05",t:""},
      {n:"Cântico 56 e anúncios",h:"14:35",t:"ts"},
      {n:"Série: 'Adore com verdade' — Na família",h:"14:45",t:"ty"},
      {n:"Série: 'Adore com verdade' — Em um mundo dividido",h:"15:00",t:"ty"},
      {n:"Série: 'Adore com verdade' — Em tempos de crise financeira",h:"15:15",t:"ty"},
      {n:'"Compre a verdade e nunca a venda"',h:"15:30",t:""},
      {n:"Cântico 29 e oração",h:"16:00",t:"ts"}
    ]}
  ]},
  rb:{sessoes:[
    {r:"🧪 Faixa de Teste",partes:[{n:"Parte de teste (10 segundos)",h:"0:00",t:"tt",dur:10000}]},
    {r:"Sessão da Manhã",partes:[
      {n:"Música",h:"9:40",t:""},{n:"Cântico 1 e oração",h:"9:50",t:"ts"},
      {n:'"Ouça o que o Espírito diz" — Como?',h:"10:00",t:""},
      {n:'"Você . . . não se cansou"',h:"10:15",t:""},
      {n:'"Não tenha medo"',h:"10:30",t:""},
      {n:"Cântico 73 e anúncios",h:"10:55",t:"ts"},
      {n:'"Você não negou a sua fé em mim"',h:"11:05",t:""},
      {n:"Batismo: O significado do seu batismo",h:"11:35",t:"tb"},
      {n:"Cântico 79",h:"12:05",t:"ts"}
    ]},
    {r:"Sessão da Tarde",partes:[
      {n:"Música",h:"13:20",t:""},{n:"Cântico 126",h:"13:30",t:"ts"},
      {n:"Experiências",h:"13:35",t:""},{n:"Resumo de A Sentinela",h:"13:45",t:""},
      {n:'Série: "Segure firme o que você tem"',h:"14:15",t:"ty"},
      {n:'Série: "Fique vigilante e fortaleça o que resta"',h:"14:30",t:"ty"},
      {n:'Série: "Pus diante de você uma porta aberta"',h:"14:45",t:"ty"},
      {n:"Cântico 76 e anúncios",h:"15:00",t:"ts"},
      {n:'"Seja zeloso"',h:"15:10",t:""},
      {n:"Cântico 129 e oração",h:"15:55",t:"ts"}
    ]}
  ]}
};

var partes=[], tickInt=null;

function fmt(ms){
  var s=Math.floor(Math.abs(ms)/1000);
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h+':'+('0'+m).slice(-2)+':'+('0'+sec).slice(-2);
}
function fmtMin(ms){
  var s=Math.floor(ms/1000);
  var m=Math.floor(s/60),sec=s%60;
  return m+'m '+('0'+sec).slice(-2)+'s';
}
function totMs(){var t=0;for(var i=0;i<partes.length;i++){var p=partes[i];t+=p.el+(p.run?Date.now()-p.st:0);}return t}
function cronN(){var n=0;for(var i=0;i<partes.length;i++){var p=partes[i];if(p.el+(p.run?Date.now()-p.st:0)>0)n++;}return n}
function salvar(){
  try{
    var pp=[];
    for(var i=0;i<partes.length;i++){var p=partes[i];pp.push({id:p.id,el:p.el,run:p.run,st:p.st});}
    localStorage.setItem('jw-v4',JSON.stringify({pk:document.getElementById('prog-select').value,pp:pp}));
  }catch(e){}
}

function ensureTick(){if(!tickInt)tickInt=setInterval(doTick,100)}
function doTick(){
  var now=Date.now(),any=false;
  for(var i=0;i<partes.length;i++){var p=partes[i];if(p.run){any=true;upd(p,p.el+(now-p.st));}}
  document.getElementById('v-total').textContent=fmt(totMs());
  document.getElementById('v-count').textContent=cronN();
  if(!any){clearInterval(tickInt);tickInt=null;}
  updBars();
}

function setCor(p){
  var card=document.getElementById('c-'+p.id);if(!card)return;
  var cur=p.el+(p.run?Date.now()-p.st:0);
  var isOver=p.dur!==null&&cur>p.dur;
  card.className='card'+(p.t==='ts'?' song':'');
  if(p.run&&isOver) card.classList.add('over');
  else if(p.run) card.classList.add('run');
  else if(!p.run&&isOver&&cur>0) card.classList.add('over');
}
function upd(p,cur){
  var eT=document.getElementById('t-'+p.id),eO=document.getElementById('o-'+p.id),bar=document.getElementById('b-'+p.id);
  if(!eT)return;
  var isOver=p.dur!==null&&cur>p.dur,exc=isOver?cur-p.dur:0;
  eT.textContent=fmt(cur);
  if(isOver){
    eT.className='ttotal red';eO.style.display='block';eO.textContent='+'+fmt(exc)+' passou';
    if(bar){bar.className='bfill over';bar.style.width='100%';}
  }else{
    eT.className='ttotal';eO.style.display='none';eO.textContent='';
    if(bar)bar.className='bfill';
  }
  setCor(p);
}
function updBars(){
  var tot=totMs();
  for(var i=0;i<partes.length;i++){
    var p=partes[i],cur=p.el+(p.run?Date.now()-p.st:0);
    var bar=document.getElementById('b-'+p.id);if(!bar)continue;
    if(!(p.dur!==null&&cur>p.dur)&&tot>0)bar.style.width=Math.round((cur/tot)*100)+'%';
  }
}
function renderAll(){
  var now=Date.now();
  for(var i=0;i<partes.length;i++){var p=partes[i];upd(p,p.el+(p.run?now-p.st:0));setCor(p);}
  updBars();
}
function refreshBtns(p){
  var ba=document.getElementById('a-'+p.id);if(!ba)return;
  if(p.run){
    ba.innerHTML='<div class="abtn" id="pb-'+p.id+'">⏸</div><div class="abtn" id="zb-'+p.id+'">↺</div>';
  }else{
    ba.innerHTML='<div class="abtn go" id="sb-'+p.id+'">▶</div><div class="abtn" id="zb-'+p.id+'">↺</div>';
  }
  tap(document.getElementById('pb-'+p.id)||document.getElementById('sb-'+p.id), p.run?function(id){return function(){pausar(id)}}(p.id):function(id){return function(){iniciar(id)}}(p.id));
  tap(document.getElementById('zb-'+p.id),function(id){return function(){zerarP(id)}}(p.id));
}

function tap(el,fn){
  if(!el)return;
  var touched=false;
  el.addEventListener('touchend',function(e){e.preventDefault();touched=true;fn();setTimeout(function(){touched=false},400);},false);
  el.addEventListener('click',function(){if(!touched)fn();},false);
}

function iniciar(id){
  var now=Date.now();
  for(var i=0;i<partes.length;i++){var p=partes[i];if(p.run&&p.id!==id){p.el+=now-p.st;p.run=false;setCor(p);refreshBtns(p);}}
  var p=partes.find(function(x){return x.id===id});
  if(!p.run){p.run=true;p.st=now;}
  document.getElementById('v-atual').textContent=p.n.length>18?p.n.slice(0,16)+'…':p.n;
  ensureTick();setCor(p);refreshBtns(p);salvar();
}
function pausar(id){
  var p=partes.find(function(x){return x.id===id});
  if(p&&p.run){p.el+=Date.now()-p.st;p.run=false;}
  document.getElementById('v-atual').textContent='—';
  setCor(p);upd(p,p.el);refreshBtns(p);salvar();
}
function zerarP(id){
  var p=partes.find(function(x){return x.id===id});if(!p)return;
  p.el=0;p.run=false;p.st=0;
  var eT=document.getElementById('t-'+id),eO=document.getElementById('o-'+id),bar=document.getElementById('b-'+id);
  if(eT){eT.textContent='0:00:00';eT.className='ttotal';}
  if(eO){eO.style.display='none';eO.textContent='';}
  if(bar){bar.style.width='0%';bar.className='bfill';}
  setCor(p);refreshBtns(p);salvar();
}
function pararTudo(){
  var now=Date.now();
  for(var i=0;i<partes.length;i++){var p=partes[i];if(p.run){p.el+=now-p.st;p.run=false;}}
  document.getElementById('v-atual').textContent='—';
  for(var i=0;i<partes.length;i++){var p=partes[i];setCor(p);upd(p,p.el);refreshBtns(p);}
  salvar();
}
function zerarTudo(){
  for(var i=0;i<partes.length;i++){var p=partes[i];p.el=0;p.run=false;p.st=0;}
  document.getElementById('v-atual').textContent='—';
  document.getElementById('v-total').textContent='0:00:00';
  document.getElementById('v-count').textContent='0';
  for(var i=0;i<partes.length;i++){
    var p=partes[i];
    var eT=document.getElementById('t-'+p.id),eO=document.getElementById('o-'+p.id),bar=document.getElementById('b-'+p.id);
    if(eT){eT.textContent='0:00:00';eT.className='ttotal';}
    if(eO){eO.style.display='none';eO.textContent='';}
    if(bar){bar.style.width='0%';bar.className='bfill';}
    setCor(p);refreshBtns(p);
  }
  salvar();
}

function mostrarResumo(){
  var tbody=document.getElementById('csv-tbody');
  var html='';
  for(var i=0;i<partes.length;i++){
    var p=partes[i];
    var cur=p.el+(p.run?Date.now()-p.st:0);
    if(cur===0)continue;
    var prev=p.dur!==null?fmtMin(p.dur):'—';
    var cronometrado=fmtMin(cur);
    var isOver=p.dur!==null&&cur>p.dur;
    var exc=isOver?'+'+fmtMin(cur-p.dur):'OK';
    html+='<tr>';
    html+='<td>'+p.n+'</td>';
    html+='<td>'+prev+'</td>';
    html+='<td>'+cronometrado+'</td>';
    html+='<td class="'+(isOver?'red':'')+'">'+exc+'</td>';
    html+='</tr>';
  }
  if(!html)html='<tr><td colspan="4" style="text-align:center;color:#555;padding:20px">Nenhuma parte cronometrada ainda</td></tr>';
  tbody.innerHTML=html;
  document.getElementById('csv-modal').classList.add('show');
}

// Botões principais
tap(document.getElementById('btn-parar'),function(){if(confirm('Parar todos os cronômetros?'))pararTudo();});
tap(document.getElementById('btn-zerar'),function(){if(confirm('Zerar tudo?'))zerarTudo();});
tap(document.getElementById('btn-csv'),mostrarResumo);
tap(document.getElementById('csv-close'),function(){document.getElementById('csv-modal').classList.remove('show');});
tap(document.getElementById('dica-x'),function(){document.getElementById('dica').style.display='none';localStorage.setItem('jw-dica','1');});

document.getElementById('prog-select').addEventListener('change',function(){loadProgram(false)});

function loadProgram(silent){
  var key=document.getElementById('prog-select').value;
  var prog=PROGS[key];
  calcDur(prog.sessoes);
  partes=[];var id=1;
  for(var si=0;si<prog.sessoes.length;si++){
    var s=prog.sessoes[si];
    for(var pi=0;pi<s.partes.length;pi++){
      var sp=s.partes[pi];
      partes.push({id:id,n:sp.n,hora:sp.h,t:sp.t,sessao:s.r,dur:sp.dur!==undefined?sp.dur:null,el:0,run:false,st:0});
      id++;
    }
  }
  document.getElementById('v-atual').textContent='—';
  document.getElementById('v-total').textContent='0:00:00';
  document.getElementById('v-count').textContent='0';
  var html='',pi2=0;
  for(var si=0;si<prog.sessoes.length;si++){
    var s=prog.sessoes[si];
    html+='<div class="sess"><div class="sess-lbl">'+s.r+'</div>';
    for(var pi=0;pi<s.partes.length;pi++){
      var sp=s.partes[pi],p=partes[pi2++];
      var tagLbl={ts:'cântico',ty:'série',tb:'batismo',tt:'teste'}[sp.t]||'';
      var tagHtml=tagLbl?'<span class="tag '+sp.t+'">'+tagLbl+'</span>':'';
      var durTxt=p.dur?(p.dur>=60000?Math.round(p.dur/60000)+' min':(p.dur/1000)+' seg'):'';
      html+='<div class="card'+(sp.t==='ts'?' song':'')+'" id="c-'+p.id+'">';
      html+='<div class="cinner"><div class="cname">'+sp.n+' '+tagHtml+'</div>';
      html+='<div class="cmeta">'+(sp.t!=='tt'?'<span class="chora">'+sp.h+'</span>':'')+(durTxt?'<span class="cdur">· '+durTxt+'</span>':'')+'</div>';
      html+='<div class="bwrap"><div class="bfill" id="b-'+p.id+'" style="width:0%"></div></div></div>';
      html+='<div class="ctimes"><span class="ttotal" id="t-'+p.id+'">0:00:00</span><span class="tover" id="o-'+p.id+'"></span></div>';
      html+='<div class="cact" id="a-'+p.id+'"></div>';
      html+='</div>';
    }
    html+='</div>';
  }
  document.getElementById('sessions').innerHTML=html;
  for(var i=0;i<partes.length;i++)refreshBtns(partes[i]);
  if(!silent)salvar();
}

function restaurar(){
  try{
    var raw=localStorage.getItem('jw-v4');if(!raw)return;
    var e=JSON.parse(raw);
    var sel=document.getElementById('prog-select');
    if(e.pk&&e.pk!==sel.value){sel.value=e.pk;loadProgram(true);}
    for(var i=0;i<e.pp.length;i++){
      var ep=e.pp[i],p=partes.find(function(x){return x.id===ep.id});if(!p)continue;
      p.el=ep.el;p.run=ep.run;p.st=ep.st;
    }
    renderAll();
    for(var i=0;i<partes.length;i++)refreshBtns(partes[i]);
    document.getElementById('v-total').textContent=fmt(totMs());
    document.getElementById('v-count').textContent=cronN();
    var av=partes.find(function(p){return p.run});
    if(av){document.getElementById('v-atual').textContent=av.n.length>18?av.n.slice(0,16)+'…':av.n;ensureTick();}
  }catch(e){}
}

if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone&&!localStorage.getItem('jw-dica')){
  setTimeout(function(){document.getElementById('dica').style.display='flex'},3000);
}

loadProgram(true);
restaurar();
</script>
</body>
</html>
